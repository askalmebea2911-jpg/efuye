<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>የኔ ወርቅ ሴት አፈቅርሻለሁ</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Ethiopic:wght@400;700;900&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            margin: 0; overflow: hidden;
            background: radial-gradient(ellipse at center, #1a0030 0%, #000008 100%);
            font-family: 'Noto Serif Ethiopic', serif;
            touch-action: none;
            position: fixed; width: 100vw; height: 100vh;
        }

        canvas { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
        #bgCanvas { z-index: 1; }
        #threeCanvas { z-index: 3; pointer-events: none; }
        #particleCanvas { z-index: 6; pointer-events: none; }

        /* ካሜራ ኮንቴይነር */
        #cameraWrapper {
            position: fixed;
            z-index: 2;
            pointer-events: none;
            display: none;
            border-radius: 50%;
        }

        #cameraShape {
            width: 100%; height: 100%;
            clip-path: url(#heartClip);
            -webkit-clip-path: url(#heartClip);
        }

        #cameraVideo {
            width: 100%; height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        /* ማስጀመሪያ ስክሪን */
        #startOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            cursor: pointer; transition: opacity 0.5s ease;
        }

        .start-btn {
            padding: 18px 45px; font-size: 22px; border-radius: 40px;
            border: none; background: linear-gradient(45deg, #ff1440, #ff4b2b);
            color: white; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 30px rgba(255, 20, 64, 0.6);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 20, 64, 0.6); }
            50% { transform: scale(1.05); box-shadow: 0 0 40px rgba(255, 20, 64, 0.8); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 20, 64, 0.6); }
        }

        #loveTextContainer {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 4; text-align: center; pointer-events: none;
            width: 100%;
        }

        #loveText {
            font-size: clamp(22px, 6vw, 38px); font-weight: 900; color: #fff;
            text-shadow: 0 0 25px rgba(255, 30, 70, 0.9);
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div id="startOverlay">
        <div style="color:white; margin-bottom:30px; font-size: 26px; text-align: center;">❤️ ለኔ ልዩ ስጦታ ❤️</div>
        <button class="start-btn">ክፈቺው</button>
    </div>

    <svg style="position: absolute; width: 0; height: 0;">
        <defs>
            <clipPath id="heartClip" clipPathUnits="objectBoundingBox">
                <path d="M0.5,0.15 C0.5,0.15 0.35,0 0.2,0.08 C0.05,0.16 0,0.35 0,0.42 C0,0.55 0.15,0.7 0.5,0.95 C0.85,0.7 1,0.55 1,0.42 C1,0.35 0.95,0.16 0.8,0.08 C0.65,0 0.5,0.15 0.5,0.15 Z" />
            </clipPath>
        </defs>
    </svg>

    <canvas id="bgCanvas"></canvas>
    
    <div id="cameraWrapper">
        <div id="cameraShape">
            <video id="cameraVideo" autoplay playsinline muted loop></video>
        </div>
    </div>

    <canvas id="threeCanvas"></canvas>
    
    <div id="loveTextContainer">
        <div id="loveText">💫 የኔ ወርቅ ሴት 💫</div>
        <div style="color: #ffe9a0; font-family: 'Dancing Script'; font-size: 22px;">አፈቅርሻለሁ ❤️</div>
    </div>
    
    <canvas id="particleCanvas"></canvas>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.157.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const W = () => window.innerWidth;
        const H = () => window.innerHeight;
        let cameraReady = false;

        // --- ካሜራ ማስጀመር በፈቃድ ---
        const startOverlay = document.getElementById('startOverlay');
        startOverlay.onclick = async () => {
            try {
                const constraints = { 
                    video: { 
                        facingMode: 'user',
                        width: { ideal: 720 },
                        height: { ideal: 720 }
                    } 
                };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                const video = document.getElementById('cameraVideo');
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    video.play();
                    cameraReady = true;
                    document.getElementById('cameraWrapper').style.display = 'block';
                    startOverlay.style.opacity = '0';
                    setTimeout(() => startOverlay.style.display = 'none', 500);
                };
            } catch (e) { 
                alert("ካሜራውን መክፈት አልተቻለም! እባክዎን በ HTTPS ሊንክ ይክፈቱ ወይም ለብሮውዘሩ ፈቃድ ይስጡ። ስህተት፦ " + e.name); 
            }
        };

        // --- 3D Scene ዝግጅት ---
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('threeCanvas'), alpha: true, antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(W(), H());
        const scene = new THREE.Scene();
        const camera3D = new THREE.PerspectiveCamera(50, W()/H(), 0.1, 1000);
        camera3D.position.z = 15;

        const heartGroup = new THREE.Group();
        scene.add(heartGroup);

        function heartEq(t) {
            return {
                x: 16 * Math.pow(Math.sin(t), 3) * 0.35,
                y: (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * 0.35
            };
        }

        // የሚያብረቀርቅ ልብ
        const geo = new THREE.BufferGeometry();
        const particleCount = 4000;
        const pos = new Float32Array(particleCount * 3);
        for(let i=0; i<particleCount; i++) {
            const pt = heartEq((i/particleCount) * Math.PI * 2);
            pos[i*3] = pt.x + (Math.random()-0.5)*0.4;
            pos[i*3+1] = pt.y + (Math.random()-0.5)*0.4;
            pos[i*3+2] = (Math.random()-0.5)*0.5;
        }
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        const mat = new THREE.PointsMaterial({ 
            size: 0.12, 
            color: 0xff3366, 
            transparent: true, 
            opacity: 0.7, 
            blending: THREE.AdditiveBlending 
        });
        heartGroup.add(new THREE.Points(geo, mat));

        // --- ካሜራውን በልቡ ቦታ ማስቀመጥ ---
        function updateCameraPos() {
            const vector = new THREE.Vector3(0, 0, 0);
            vector.project(camera3D);
            const x = (vector.x * 0.5 + 0.5) * W();
            const y = (-vector.y * 0.5 + 0.5) * H();
            
            const wrapper = document.getElementById('cameraWrapper');
            const size = Math.min(W(), H()) * 0.75; 
            wrapper.style.width = size + 'px';
            wrapper.style.height = size + 'px';
            wrapper.style.left = (x - size/2) + 'px';
            wrapper.style.top = (y - size/2) + 'px';
        }

        // --- Animation Loop ---
        function animate() {
            const time = Date.now() * 0.001;
            heartGroup.rotation.y = Math.sin(time * 0.5) * 0.2;
            heartGroup.scale.setScalar(1 + Math.sin(time * 2) * 0.05);
            
            renderer.render(scene, camera3D);
            if(cameraReady) updateCameraPos();
            requestAnimationFrame(animate);
        }
        animate();

        window.onresize = () => {
            renderer.setSize(W(), H());
            camera3D.aspect = W()/H();
            camera3D.updateProjectionMatrix();
        };
    </script>
</body>
</html>
