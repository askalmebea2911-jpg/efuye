<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>የኔ ወርቅ ሴት</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#000;overflow:hidden;position:fixed;width:100vw;height:100vh;touch-action:none}
        canvas{position:fixed;top:0;left:0;width:100%;height:100%}
        #bg{z-index:1}
        #cam{z-index:2;pointer-events:none}
        #three{z-index:3;pointer-events:none}
        #fluff{z-index:4;pointer-events:none}
        #txt{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5;text-align:center;pointer-events:none;width:100%}
        #t1{font:900 clamp(22px,5vw,34px) 'Nyala',serif;color:#fff;text-shadow:0 0 30px #f06,0 0 60px #f03}
        #t2{font:clamp(16px,4vw,22px) 'Nyala',serif;color:#fd0;text-shadow:0 0 20px #fa0}
    </style>
</head>
<body>
    <video id="vid" autoplay playsinline muted style="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0"></video>
    <canvas id="bg"></canvas>
    <canvas id="cam"></canvas>
    <canvas id="three"></canvas>
    <div id="txt"><div id="t1">💫 የኔ ወርቅ ሴት 💫</div><div id="t2">አፈቅርሻለሁ ❤️</div></div>
    <canvas id="fluff"></canvas>

    <script type="importmap">
        {"imports":{"three":"https://unpkg.com/three@0.157.0/build/three.module.js"}}
    </script>

    <script type="module">
        import * as THREE from 'three';

        const W=()=>window.innerWidth,H=()=>window.innerHeight;
        const isMobile=/Mobi|Android/i.test(navigator.userAgent);
        const vid=document.getElementById('vid');
        const bgC=document.getElementById('bg').getContext('2d');
        const camC=document.getElementById('cam').getContext('2d');
        const flC=document.getElementById('fluff').getContext('2d');
        let camOn=false;

        // ===== ካሜራ =====
        (async()=>{
            try{
                const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:640,height:640}});
                vid.srcObject=s;vid.onloadedmetadata=()=>{vid.play();camOn=true}
            }catch(e){camOn=false}
        })();

        // ===== ጋላክሲ =====
        let stars=[],nebs=[];
        class Star{
            constructor(){this.rst(true)}
            rst(f){this.x=f?Math.random()*W():(Math.random()<0.5?-10:W()+10);this.y=f?Math.random()*H():Math.random()*H();this.r=Math.random()*2+0.5;this.sp=Math.random()*0.015+0.003;this.ph=Math.random()*Math.PI*2;this.hue=Math.random()<0.3?Math.random()*40+20:Math.random()*60+200}
            up(){this.ph+=this.sp;this.x+=0.02;if(this.x>W()+10)this.rst(false)}
            dr(c){const a=(Math.sin(this.ph)+1)/2*0.6+0.4;c.beginPath();c.arc(this.x,this.y,this.r,0,Math.PI*2);c.fillStyle=`hsla(${this.hue},80%,75%,${a})`;c.fill();if(this.r>1.2&&a>0.7){c.beginPath();c.arc(this.x,this.y,this.r*3,0,Math.PI*2);c.fillStyle=`hsla(${this.hue},80%,75%,${a*0.1})`;c.fill()}}
        }
        class Nebula{
            constructor(){this.x=Math.random()*W();this.y=Math.random()*H();this.rad=Math.random()*180+80;this.hue=[280,320,340,30,200,250][Math.floor(Math.random()*6)];this.al=Math.random()*0.05+0.03;this.sp=(Math.random()-0.5)*0.06;this.parts=[];for(let i=0;i<50;i++){const a=Math.random()*Math.PI*2;const d=Math.random()*this.rad;this.parts.push({x:this.x+Math.cos(a)*d,y:this.y+Math.sin(a)*d*0.6,r:Math.random()*2+0.5,ph:Math.random()*Math.PI*2,sp:Math.random()*0.02+0.008})}}
            up(){this.x+=this.sp;if(this.x>W()+this.rad)this.x=-this.rad;if(this.x<-this.rad)this.x=W()+this.rad;for(let p of this.parts)p.ph+=p.sp}
            dr(c){const g=c.createRadialGradient(this.x,this.y,0,this.x,this.y,this.rad);g.addColorStop(0,`hsla(${this.hue},70%,65%,${this.al*2})`);g.addColorStop(0.3,`hsla(${this.hue},60%,50%,${this.al*1.2})`);g.addColorStop(0.6,`hsla(${this.hue},45%,35%,${this.al*0.4})`);g.addColorStop(1,'transparent');c.fillStyle=g;c.fillRect(this.x-this.rad,this.y-this.rad,this.rad*2,this.rad*2);for(let p of this.parts){const a=(Math.sin(p.ph)+1)/2*0.5+0.5;c.beginPath();c.arc(p.x,p.y,p.r,0,Math.PI*2);c.fillStyle=`hsla(${this.hue},80%,75%,${a*this.al*3})`;c.fill()}}
        }
        function initBg(){stars=[];for(let i=0;i<(isMobile?130:220);i++)stars.push(new Star());nebs=[];for(let i=0;i<(isMobile?3:6);i++)nebs.push(new Nebula())}
        function drawBg(){bgC.clearRect(0,0,W(),H());const g=bgC.createRadialGradient(W()/2,H()/2,0,W()/2,H()/2,Math.max(W(),H())*0.8);g.addColorStop(0,'rgba(30,5,60,0.45)');g.addColorStop(0.3,'rgba(15,2,30,0.55)');g.addColorStop(0.6,'rgba(5,0,15,0.8)');g.addColorStop(1,'#000003');bgC.fillStyle=g;bgC.fillRect(0,0,W(),H());for(let n of nebs){n.up();n.dr(bgC)}for(let s of stars){s.up();s.dr(bgC)}}

        // ===== 3D ልብ =====
        const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('three'),alpha:true,antialias:true});
        renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.setSize(W(),H());
        const scene=new THREE.Scene();
        const cam3D=new THREE.PerspectiveCamera(50,W()/H(),0.1,1000);cam3D.position.z=isMobile?14:12;
        const heartGroup=new THREE.Group();scene.add(heartGroup);

        function heq(t){return{x:16*Math.pow(Math.sin(t),3)*0.35,y:(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))*0.35,z:3*Math.sin(t)*Math.cos(t)*0.35}}

        // የ3D ልብ መስመሮች
        const totalLines=100,ptsPerLine=200;
        for(let line=0;line<totalLines;line++){
            const offset=(line/totalLines-0.5)*2.5;
            const lGeo=new THREE.BufferGeometry();const verts=[];
            for(let i=0;i<ptsPerLine;i++){const t=(i/(ptsPerLine-1))*Math.PI*2;const pt=heq(t);verts.push(pt.x+offset*0.08,pt.y,pt.z+offset*0.15)}
            lGeo.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));
            const lMat=new THREE.LineBasicMaterial({color:new THREE.Color().setHSL(0.94+Math.random()*0.1,1,0.5+Math.random()*0.4),transparent:true,opacity:0.3+Math.random()*0.5,blending:THREE.AdditiveBlending,depthWrite:false});
            heartGroup.add(new THREE.Line(lGeo,lMat));
        }

        // የላይኛው መስመር
        const outlinePts=300,oGeo=new THREE.BufferGeometry(),oVerts=[];
        for(let i=0;i<outlinePts;i++){const t=(i/(outlinePts-1))*Math.PI*2;const pt=heq(t);oVerts.push(pt.x,pt.y,pt.z)}
        oGeo.setAttribute('position',new THREE.Float32BufferAttribute(oVerts,3));
        heartGroup.add(new THREE.Line(oGeo,new THREE.LineBasicMaterial({color:0xff3366,transparent:true,opacity:0.9,blending:THREE.AdditiveBlending,depthWrite:false})));

        // ===== 3D→2D (የልቡ ቦታ ለካሜራ መስኮት) =====
        function getHeart2D(){
            const pts=[];
            for(let i=0;i<120;i++){const t=(i/120)*Math.PI*2;const pt=heq(t);const v=new THREE.Vector3(pt.x,pt.y,pt.z);v.applyMatrix4(heartGroup.matrixWorld);v.project(cam3D);pts.push({x:(v.x*0.5+0.5)*W(),y:(-v.y*0.5+0.5)*H()})}
            let mnX=Infinity,mnY=Infinity,mxX=-Infinity,mxY=-Infinity;
            for(const p of pts){if(p.x<mnX)mnX=p.x;if(p.y<mnY)mnY=p.y;if(p.x>mxX)mxX=p.x;if(p.y>mxY)mxY=p.y}
            const rawSize=Math.max(mxX-mnX,mxY-mnY)*1.08;
            const size=Math.min(rawSize,Math.min(W(),H())*0.85);
            const cx=(mnX+mxX)/2,cy=(mnY+mxY)/2,half=size/2;
            return{x:Math.max(half+8,Math.min(W()-half-8,cx)),y:Math.max(half+8,Math.min(H()-half-8,cy)),size}
        }

        // ===== ካሜራ በ3D ልብ ውስጥ (መስኮት) =====
        function drawCam(pos){
            camC.clearRect(0,0,W(),H());
            const{x:cx,y:cy,size}=pos,s=size/30;
            camC.save();
            camC.beginPath();
            camC.moveTo(cx,cy-s*5);
            camC.bezierCurveTo(cx-s*12,cy-s*12,cx-s*18,cy+s*2,cx,cy+s*14);
            camC.bezierCurveTo(cx+s*18,cy+s*2,cx+s*12,cy-s*12,cx,cy-s*5);
            camC.closePath();camC.clip();
            if(camOn&&vid.readyState>=2){camC.save();camC.scale(-1,1);const vs=size*1.5;camC.drawImage(vid,-(cx+vs/2),cy-vs/2,vs,vs);camC.restore()}
            else{const g=camC.createRadialGradient(cx,cy-size*0.05,size*0.05,cx,cy,size*0.6);g.addColorStop(0,'rgba(255,20,60,0.5)');g.addColorStop(1,'rgba(0,0,0,0)');camC.fillStyle=g;camC.fill()}
            camC.restore();
        }

        // ===== እፉዬ ገላ =====
        let fluffs=[];
        class Fl{
            constructor(){this.rst(true)}
            rst(f){this.x=f?Math.random()*W():-50;this.y=f?Math.random()*H():Math.random()*H();this.vx=(Math.random()-0.5)*0.5;this.vy=-Math.random()*0.45-0.1;this.sz=Math.random()*3.5+2.5;this.fz=this.sz*3.2;this.w=Math.random()*Math.PI*2;this.ws=(Math.random()-0.5)*0.03;this.o=Math.random()*0.4+0.55;this.n=16+Math.floor(Math.random()*8)}
            up(){this.w+=this.ws;this.vx+=Math.sin(this.w)*0.012;this.vy+=Math.cos(this.w)*0.012;this.x+=this.vx;this.y+=this.vy;this.vx*=0.998;this.vy*=0.998;if(this.x<-60)this.x=W()+60;if(this.x>W()+60)this.x=-60;if(this.y<-60)this.y=H()+60;if(this.y>H()+60)this.y=-60}
            dr(c){c.save();c.translate(this.x,this.y);c.globalAlpha=this.o;for(let i=0;i<this.n;i++){const a=(i/this.n)*Math.PI*2+this.w*0.3;const sx=Math.cos(a)*this.sz*0.4,sy=Math.sin(a)*this.sz*0.4,ex=Math.cos(a)*this.fz,ey=Math.sin(a)*this.fz;c.beginPath();c.moveTo(sx,sy);c.lineTo(ex,ey);c.strokeStyle='rgba(255,255,255,0.65)';c.lineWidth=0.7;c.stroke();c.beginPath();c.arc(ex,ey,0.9,0,Math.PI*2);c.fillStyle='rgba(255,255,255,0.85)';c.fill();c.beginPath();c.arc(ex,ey,2.5,0,Math.PI*2);c.fillStyle='rgba(255,255,255,0.2)';c.fill()}c.beginPath();c.arc(0,0,this.sz*0.55,0,Math.PI*2);const sg=c.createRadialGradient(0,0,0,0,0,this.sz*0.55);sg.addColorStop(0,'#ffffff');sg.addColorStop(0.6,'#fef9f0');sg.addColorStop(1,'rgba(200,180,150,0.3)');c.fillStyle=sg;c.fill();c.restore()}
        }
        function initFl(){fluffs=[];for(let i=0;i<(isMobile?45:65);i++)fluffs.push(new Fl())}
        function drawFl(){flC.clearRect(0,0,W(),H());for(let f of fluffs){f.up();f.dr(flC)}}

        // ===== ሪሳይዝ =====
        function resize(){['bg','cam','fluff'].forEach(id=>{const c=document.getElementById(id);c.width=W();c.height=H()});renderer.setSize(W(),H());cam3D.aspect=W()/H();cam3D.updateProjectionMatrix();initBg();initFl()}
        window.addEventListener('resize',resize);

        // ===== አኒሜሽን =====
        function animate(ts){
            const t=ts*0.001;
            heartGroup.rotation.y=Math.sin(t*0.5)*0.5;
            heartGroup.rotation.x=Math.cos(t*0.6)*0.25;
            heartGroup.rotation.z=Math.sin(t*0.4)*0.3;
            heartGroup.scale.setScalar(1+Math.sin(t*1.8)*0.04);
            heartGroup.updateMatrixWorld();
            drawBg();
            renderer.render(scene,cam3D);
            drawCam(getHeart2D());
            drawFl();
            requestAnimationFrame(animate);
        }
        resize();requestAnimationFrame(animate);
    </script>
</body>
</html>
