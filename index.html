<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>የኔ ወርቅ ሴት አፈቅርሻለሁ</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Ethiopic:wght@400;700;900&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            margin: 0; overflow: hidden;
            background: #000008;
            font-family: 'Noto Serif Ethiopic', serif;
            touch-action: none;
            position: fixed; width: 100vw; height: 100vh;
            cursor: default;
        }

        canvas { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
        #bgCanvas { z-index: 1; }
        #threeCanvas { z-index: 3; pointer-events: none; }
        #lensCanvas { z-index: 4; pointer-events: none; }
        #particleCanvas { z-index: 6; pointer-events: none; }

        #cameraWrapper {
            position: fixed;
            z-index: 2;
            pointer-events: none;
            display: none;
            transition: opacity 0.3s ease;
        }

        #cameraShape {
            width: 100%; height: 100%;
            clip-path: url(#heartClip);
            -webkit-clip-path: url(#heartClip);
            overflow: hidden;
        }

        #cameraVideo {
            width: 100%; height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        #startOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at center, #1a0030 0%, #000010 100%);
            z-index: 100;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            cursor: pointer; transition: opacity 0.6s ease;
        }

        .start-btn {
            padding: 18px 50px; font-size: 24px; border-radius: 50px;
            border: 2px solid rgba(255, 100, 150, 0.6);
            background: rgba(255, 20, 64, 0.2);
            color: white; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 40px rgba(255, 20, 64, 0.4), inset 0 0 20px rgba(255, 20, 64, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            animation: pulse 2s infinite;
            letter-spacing: 2px;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 30px rgba(255, 20, 64, 0.4); }
            50% { transform: scale(1.06); box-shadow: 0 0 60px rgba(255, 20, 64, 0.7); }
            100% { transform: scale(1); box-shadow: 0 0 30px rgba(255, 20, 64, 0.4); }
        }

        #loveTextContainer {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5; text-align: center; pointer-events: none;
            width: 100%;
            animation: textFloat 3s ease-in-out infinite;
        }

        @keyframes textFloat {
            0%, 100% { transform: translate(-50%, -50%) translateY(0); }
            50% { transform: translate(-50%, -50%) translateY(-6px); }
        }

        #loveText {
            font-size: clamp(22px, 5.5vw, 36px); font-weight: 900; color: #fff;
            text-shadow: 0 0 25px rgba(255, 30, 70, 0.95), 0 0 50px rgba(255, 80, 120, 0.6), 0 0 80px rgba(255, 150, 100, 0.3);
            margin-bottom: 8px; letter-spacing: 0.03em;
        }

        #loveSub {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(16px, 4vw, 24px);
            color: #ffe9a0;
            text-shadow: 0 0 20px rgba(255, 200, 50, 0.8), 0 0 40px rgba(255, 150, 30, 0.4);
            animation: subPulse 2.5s ease-in-out infinite;
        }

        @keyframes subPulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; }
    </style>
</head>
<body>

    <div id="startOverlay">
        <div style="color:white; margin-bottom:30px; font-size: clamp(20px, 5vw, 28px); text-align: center; text-shadow: 0 0 20px rgba(255,255,255,0.5);">
            ✨ ለኔ ወርቅ ሴት ልዩ ስጦታ ✨
        </div>
        <button class="start-btn">❤️ ክፈቺው ❤️</button>
    </div>

    <svg class="sr-only">
        <defs>
            <clipPath id="heartClip" clipPathUnits="objectBoundingBox">
                <path d="M0.5,0.1 
                         C0.5,0.1 0.36,0 0.22,0.07 
                         C0.08,0.14 0.04,0.32 0.04,0.4 
                         C0.04,0.54 0.18,0.68 0.5,0.92 
                         C0.82,0.68 0.96,0.54 0.96,0.4 
                         C0.96,0.32 0.92,0.14 0.78,0.07 
                         C0.64,0 0.5,0.1 0.5,0.1 Z" />
            </clipPath>
        </defs>
    </svg>

    <canvas id="bgCanvas"></canvas>
    
    <div id="cameraWrapper">
        <div id="cameraShape">
            <video id="cameraVideo" autoplay playsinline muted loop></video>
        </div>
    </div>

    <canvas id="threeCanvas"></canvas>
    <canvas id="lensCanvas"></canvas>
    
    <div id="loveTextContainer">
        <div id="loveText">💫 የኔ ወርቅ ሴት 💫</div>
        <div id="loveSub">አፈቅርሻለሁ ❤️</div>
    </div>
    
    <canvas id="particleCanvas"></canvas>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.157.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ==================== መሰረታዊ ====================
        const W = () => window.innerWidth;
        const H = () => window.innerHeight;
        const isMobile = /Mobi|Android/i.test(navigator.userAgent);
        let cameraReady = false;

        // ==================== ካሜራ ====================
        const video = document.getElementById('cameraVideo');
        const cameraWrapper = document.getElementById('cameraWrapper');
        const startOverlay = document.getElementById('startOverlay');

        startOverlay.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: { ideal: 720 }, height: { ideal: 720 } }
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    cameraReady = true;
                    cameraWrapper.style.display = 'block';
                    startOverlay.style.opacity = '0';
                    setTimeout(() => startOverlay.style.display = 'none', 600);
                };
            } catch (e) {
                alert("⚠️ ካሜራ መክፈት አልተቻለም። እባክዎ ፈቃድ ይስጡ። (" + e.name + ")");
            }
        };

        // ==================== ጋላክሲ ዳራ ====================
        const bgCanvas = document.getElementById('bgCanvas');
        const bgCtx = bgCanvas.getContext('2d');
        let stars = [], nebulae = [], shootingStars = [];

        class Star {
            constructor() {
                this.reset(true);
            }
            reset(initial) {
                this.x = initial ? Math.random() * W() : (Math.random() < 0.5 ? -10 : W() + 10);
                this.y = initial ? Math.random() * H() : Math.random() * H();
                this.r = Math.random() * 1.8 + 0.2;
                this.twinkleSpeed = Math.random() * 0.02 + 0.005;
                this.phase = Math.random() * Math.PI * 2;
                this.hue = Math.random() < 0.3 ? Math.random() * 30 + 25 : Math.random() * 60 + 200;
            }
            update() {
                this.phase += this.twinkleSpeed;
                this.x += 0.02;
                if (this.x > W() + 10) this.reset(false);
            }
            draw(ctx) {
                const alpha = (Math.sin(this.phase) + 1) / 2 * 0.7 + 0.3;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 70%, 75%, ${alpha})`;
                ctx.fill();
                if (this.r > 1 && alpha > 0.75) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.r * 3, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${this.hue}, 70%, 75%, ${alpha * 0.1})`;
                    ctx.fill();
                }
            }
        }

        class Nebula {
            constructor() {
                this.x = Math.random() * W();
                this.y = Math.random() * H();
                this.radius = Math.random() * 120 + 50;
                this.hue = [280, 320, 340, 30, 200][Math.floor(Math.random() * 5)];
                this.alpha = Math.random() * 0.04 + 0.02;
                this.speed = (Math.random() - 0.5) * 0.1;
            }
            update() {
                this.x += this.speed;
                if (this.x > W() + this.radius) this.x = -this.radius;
                if (this.x < -this.radius) this.x = W() + this.radius;
            }
            draw(ctx) {
                const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
                grad.addColorStop(0, `hsla(${this.hue}, 60%, 55%, ${this.alpha * 1.5})`);
                grad.addColorStop(0.5, `hsla(${this.hue}, 45%, 35%, ${this.alpha})`);
                grad.addColorStop(1, 'transparent');
                ctx.fillStyle = grad;
                ctx.fillRect(this.x - this.radius, this.y - this.radius, this.radius * 2, this.radius * 2);
            }
        }

        class ShootingStar {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * W();
                this.y = Math.random() * H() * 0.5;
                this.len = Math.random() * 70 + 30;
                this.speed = Math.random() * 7 + 3;
                this.angle = Math.PI / 4 + (Math.random() - 0.5) * 0.4;
                this.life = 1;
            }
            update() {
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
                this.life -= 0.007;
                if (this.life <= 0 || this.x > W() + 100 || this.y > H() + 100) this.reset();
            }
            draw(ctx) {
                if (this.life <= 0) return;
                const ex = this.x - Math.cos(this.angle) * this.len;
                const ey = this.y - Math.sin(this.angle) * this.len;
                const grad = ctx.createLinearGradient(this.x, this.y, ex, ey);
                grad.addColorStop(0, `rgba(255,255,255,${this.life})`);
                grad.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(ex, ey);
                ctx.strokeStyle = grad;
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }
        }

        function initBackground() {
            stars = [];
            for (let i = 0; i < (isMobile ? 120 : 200); i++) stars.push(new Star());
            nebulae = [];
            for (let i = 0; i < (isMobile ? 3 : 5); i++) nebulae.push(new Nebula());
            shootingStars = [];
            for (let i = 0; i < 2; i++) shootingStars.push(new ShootingStar());
        }

        function drawBackground() {
            bgCtx.clearRect(0, 0, W(), H());
            const mainGrad = bgCtx.createRadialGradient(W()/2, H()/2, 0, W()/2, H()/2, Math.max(W(), H()) * 0.7);
            mainGrad.addColorStop(0, 'rgba(25, 5, 50, 0.35)');
            mainGrad.addColorStop(0.4, 'rgba(10, 2, 20, 0.55)');
            mainGrad.addColorStop(1, 'rgba(0, 0, 8, 0.95)');
            bgCtx.fillStyle = mainGrad;
            bgCtx.fillRect(0, 0, W(), H());
            
            for (let nebula of nebulae) { nebula.update(); nebula.draw(bgCtx); }
            for (let star of stars) { star.update(); star.draw(bgCtx); }
            for (let ss of shootingStars) { ss.update(); ss.draw(bgCtx); }
        }

        // ==================== 3D ልብ ====================
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('threeCanvas'), alpha: true, antialias: !isMobile });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(W(), H());
        
        const scene = new THREE.Scene();
        const camera3D = new THREE.PerspectiveCamera(50, W() / H(), 0.1, 1000);
        camera3D.position.z = isMobile ? 16 : 14;
        
        const heartGroup = new THREE.Group();
        scene.add(heartGroup);

        function heartEq(t) {
            return {
                x: 16 * Math.pow(Math.sin(t), 3) * 0.35,
                y: (13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)) * 0.35,
                z: 2.5 * Math.sin(t) * Math.cos(t) * 0.35
            };
        }

        // ዋና ልብ
        const mainCount = isMobile ? 2000 : 3500;
        const mainGeo = new THREE.BufferGeometry();
        const mainPos = new Float32Array(mainCount * 3);
        const mainCol = new Float32Array(mainCount * 3);

        for (let i = 0; i < mainCount; i++) {
            const pt = heartEq((i / mainCount) * Math.PI * 2);
            mainPos[i*3] = pt.x + (Math.random() - 0.5) * 0.4;
            mainPos[i*3+1] = pt.y + (Math.random() - 0.5) * 0.4;
            mainPos[i*3+2] = pt.z + (Math.random() - 0.5) * 0.4;
            const hue = 0.95 + Math.random() * 0.05;
            const col = new THREE.Color().setHSL(hue, 1, 0.5 + Math.random() * 0.3);
            mainCol[i*3] = col.r;
            mainCol[i*3+1] = col.g;
            mainCol[i*3+2] = col.b;
        }

        mainGeo.setAttribute('position', new THREE.BufferAttribute(mainPos, 3));
        mainGeo.setAttribute('color', new THREE.BufferAttribute(mainCol, 3));

        const glowTex = (() => {
            const c = document.createElement('canvas');
            c.width = 64; c.height = 64;
            const ctx = c.getContext('2d');
            const grad = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            grad.addColorStop(0, 'rgba(255,255,255,1)');
            grad.addColorStop(0.2, 'rgba(255,255,255,0.9)');
            grad.addColorStop(0.5, 'rgba(255,150,180,0.5)');
            grad.addColorStop(0.8, 'rgba(255,50,80,0.1)');
            grad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 64, 64);
            return new THREE.CanvasTexture(c);
        })();

        const mainMat = new THREE.PointsMaterial({
            size: isMobile ? 0.2 : 0.16,
            map: glowTex,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true,
            opacity: 0.85,
        });

        heartGroup.add(new THREE.Points(mainGeo, mainMat));

        // የውጭ ብርሃን
        const glowCount = isMobile ? 500 : 800;
        const glowGeo = new THREE.BufferGeometry();
        const glowPos = new Float32Array(glowCount * 3);
        for (let i = 0; i < glowCount; i++) {
            const pt = heartEq((i / glowCount) * Math.PI * 2);
            const sf = 1.3 + Math.random() * 0.5;
            glowPos[i*3] = pt.x * sf + (Math.random() - 0.5) * 0.5;
            glowPos[i*3+1] = pt.y * sf + (Math.random() - 0.5) * 0.5;
            glowPos[i*3+2] = pt.z * sf;
        }
        glowGeo.setAttribute('position', new THREE.BufferAttribute(glowPos, 3));
        const glowMat = new THREE.PointsMaterial({
            size: isMobile ? 0.35 : 0.25,
            map: glowTex,
            color: 0xff3355,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true,
            opacity: 0.3,
        });
        heartGroup.add(new THREE.Points(glowGeo, glowMat));

        // ==================== አጉሊ መነጽር ሌንስ ውጤት ====================
        const lensCanvas = document.getElementById('lensCanvas');
        const lensCtx = lensCanvas.getContext('2d');

        function drawLensEffect(cx, cy, size) {
            lensCtx.clearRect(0, 0, W(), H());
            
            // የውጭ ጨለማ ቀለበት (vignette)
            const outerGrad = lensCtx.createRadialGradient(cx, cy, size * 0.45, cx, cy, size * 0.7);
            outerGrad.addColorStop(0, 'rgba(0,0,0,0)');
            outerGrad.addColorStop(0.5, 'rgba(0,0,0,0.1)');
            outerGrad.addColorStop(0.8, 'rgba(0,0,0,0.4)');
            outerGrad.addColorStop(1, 'rgba(0,0,0,0.7)');
            lensCtx.fillStyle = outerGrad;
            lensCtx.fillRect(0, 0, W(), H());
            
            // የብርሃን ነጸብራቅ (specular highlight)
            const highlightGrad = lensCtx.createRadialGradient(cx - size * 0.15, cy - size * 0.2, size * 0.02, cx, cy, size * 0.55);
            highlightGrad.addColorStop(0, 'rgba(255,255,255,0.3)');
            highlightGrad.addColorStop(0.3, 'rgba(255,255,255,0.08)');
            highlightGrad.addColorStop(0.6, 'rgba(255,200,220,0.03)');
            highlightGrad.addColorStop(1, 'rgba(0,0,0,0)');
            lensCtx.fillStyle = highlightGrad;
            lensCtx.fillRect(0, 0, W(), H());
            
            // የመስታወት ጠርዝ ብርሃን
            lensCtx.save();
            lensCtx.beginPath();
            lensCtx.arc(cx, cy, size * 0.52, 0, Math.PI * 2);
            lensCtx.strokeStyle = 'rgba(255,255,255,0.2)';
            lensCtx.lineWidth = 2;
            lensCtx.shadowColor = 'rgba(255,255,255,0.3)';
            lensCtx.shadowBlur = 15;
            lensCtx.stroke();
            lensCtx.restore();
        }

        // ==================== ካሜራ አቀማመጥ ====================
        function updateCameraPos(time) {
            const vector = new THREE.Vector3(0, -0.5, 0);
            vector.applyMatrix4(heartGroup.matrixWorld);
            vector.project(camera3D);
            
            const x = (vector.x * 0.5 + 0.5) * W();
            const y = (-vector.y * 0.5 + 0.5) * H();
            
            const baseSize = Math.min(W(), H()) * 0.72;
            const breathe = 1 + Math.sin(time * 0.0015) * 0.04;
            const size = baseSize * breathe;
            
            cameraWrapper.style.width = size + 'px';
            cameraWrapper.style.height = size + 'px';
            cameraWrapper.style.left = (x - size / 2) + 'px';
            cameraWrapper.style.top = (y - size / 2) + 'px';
            
            // ሌንስ ውጤት
            if (cameraReady) {
                drawLensEffect(x, y, size);
            }
        }

        // ==================== እፉዬ ገላ ====================
        const pCanvas = document.getElementById('particleCanvas');
        const pCtx = pCanvas.getContext('2d');
        let fluffs = [];
        let mouseX = -200, mouseY = -200, touchActive = false;

        class Fluff {
            constructor() {
                this.reset(true);
            }
            reset(initial) {
                this.x = initial ? Math.random() * W() : -40;
                this.y = initial ? Math.random() * H() : Math.random() * H();
                this.vx = (Math.random() - 0.5) * 0.6;
                this.vy = -Math.random() * 0.45 - 0.1;
                this.size = Math.random() * 2.3 + 1.4;
                this.fluffSize = this.size * 2.7;
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = (Math.random() - 0.5) * 0.035;
                this.opacity = Math.random() * 0.3 + 0.55;
                this.strands = 13 + Math.floor(Math.random() * 6);
            }
            update() {
                this.wobble += this.wobbleSpeed;
                this.vx += Math.sin(this.wobble) * 0.012;
                this.vy += Math.cos(this.wobble) * 0.012;
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.998;
                this.vy *= 0.998;
                if (this.x < -50) this.x = W() + 50;
                if (this.x > W() + 50) this.x = -50;
                if (this.y < -50) this.y = H() + 50;
                if (this.y > H() + 50) this.y = -50;
                
                if (touchActive) {
                    const dx = this.x - mouseX;
                    const dy = this.y - mouseY;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 100) {
                        const ang = Math.atan2(dy, dx);
                        const force = (100 - dist) / 100 * 0.11;
                        this.vx += Math.cos(ang) * force;
                        this.vy += Math.sin(ang) * force;
                    }
                }
            }
            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.globalAlpha = this.opacity;
                for (let i = 0; i < this.strands; i++) {
                    const ang = (i / this.strands) * Math.PI * 2 + this.wobble * 0.35;
                    const sx = Math.cos(ang) * this.size * 0.5;
                    const sy = Math.sin(ang) * this.size * 0.5;
                    const ex = Math.cos(ang) * this.fluffSize;
                    const ey = Math.sin(ang) * this.fluffSize;
                    ctx.beginPath();
                    ctx.moveTo(sx, sy);
                    ctx.lineTo(ex, ey);
                    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                    ctx.lineWidth = 0.45;
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(ex, ey, 0.55, 0, Math.PI*2);
                    ctx.fillStyle = 'rgba(255,255,255,0.7)';
                    ctx.fill();
                }
                ctx.beginPath();
                ctx.arc(0, 0, this.size * 0.5, 0, Math.PI*2);
                ctx.fillStyle = '#fef9f0';
                ctx.fill();
                ctx.restore();
            }
        }

        function initFluffs() {
            fluffs = [];
            for (let i = 0; i < (isMobile ? 35 : 50); i++) fluffs.push(new Fluff());
        }

        function drawFluffs() {
            pCtx.clearRect(0, 0, W(), H());
            for (let f of fluffs) { f.update(); f.draw(pCtx); }
        }

        // ==================== ክስተቶች ====================
        function onMove(x, y) { mouseX = x; mouseY = y; touchActive = true; }
        function onLeave() { touchActive = false; }
        
        window.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
        window.addEventListener('mouseleave', onLeave);
        window.addEventListener('touchstart', e => { e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
        window.addEventListener('touchmove', e => { e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
        window.addEventListener('touchend', onLeave);
        window.addEventListener('touchcancel', onLeave);

        // ==================== ሪሳይዝ ====================
        function resize() {
            bgCanvas.width = W(); bgCanvas.height = H();
            renderer.setSize(W(), H());
            camera3D.aspect = W() / H();
            camera3D.updateProjectionMatrix();
            lensCanvas.width = W(); lensCanvas.height = H();
            pCanvas.width = W(); pCanvas.height = H();
            initBackground();
            initFluffs();
        }
        window.addEventListener('resize', resize);

        // ==================== ዋና ሉፕ ====================
        function animate(ts) {
            const time = ts * 0.001;
            
            // ልብ እንቅስቃሴ
            heartGroup.rotation.y = Math.sin(time * 0.5) * 0.25;
            heartGroup.rotation.x = Math.cos(time * 0.6) * 0.12;
            heartGroup.rotation.z = Math.sin(time * 0.4) * 0.18;
            heartGroup.scale.setScalar(1 + Math.sin(time * 1.8) * 0.04);
            
            // ማትሪክስ አዘምን
            heartGroup.updateMatrixWorld();
            
            // ስዕል
            drawBackground();
            renderer.render(scene, camera3D);
            if (cameraReady) updateCameraPos(ts);
            else lensCtx.clearRect(0, 0, W(), H());
            drawFluffs();
            
            requestAnimationFrame(animate);
        }

        // ==================== ማስጀመር ====================
        resize();
        requestAnimationFrame(animate);

        console.log('💖 ሁሉም ነገር ዝግጁ ነው - ጋላክሲ፣ ልብ፣ ካሜራ፣ ሌንስ፣ እፉዬ ገላ!');
    </script>
</body>
</html>
