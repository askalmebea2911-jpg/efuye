<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>የኔ ወርቅ ሴት - ጥምር ጥበብ</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#000;overflow:hidden;position:fixed;width:100vw;height:100vh;touch-action:none;font-family: 'Nyala', serif;}
        canvas{position:fixed;top:0;left:0}
        #bg{z-index:1}
        #cam{z-index:2}
        #txt{
            position:fixed;top:50%;left:50%;transform:translate(-50%, -50%);
            z-index:5;text-align:center;pointer-events:none;width:100%;
        }
        #t1{font:900 clamp(24px,6vw,40px) 'Nyala';color:#fff;text-shadow:0 0 20px #ff0066, 0 0 40px #ff0033; letter-spacing: 2px;}
        #t2{font:bold clamp(18px,4.5vw,26px) 'Nyala';color:#ffd700;text-shadow:0 0 15px #ffaa00; margin-top: 10px;}
    </style>
</head>
<body>
    <video id="vid" autoplay playsinline muted style="display:none"></video>
    <canvas id="bg"></canvas>
    <canvas id="cam"></canvas>
    
    <div id="txt">
        <div id="t1">💫 የኔ ወርቅ ሴት 💫</div>
        <div id="t2">አፈቅርሻለሁ ❤️</div>
    </div>

    <script>
        const canvas = document.getElementById('cam');
        const ctx = canvas.getContext('2d');
        const bgCanvas = document.getElementById('bg');
        const bgCtx = bgCanvas.getContext('2d');
        const vid = document.getElementById('vid');

        let w, h, camOn = false;
        let particles = [];

        // ካሜራን ማስጀመር
        async function initCam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                vid.srcObject = stream;
                vid.onloadedmetadata = () => { vid.play(); camOn = true; };
            } catch (e) { console.log("Camera access denied"); }
        }

        function resize() {
            w = canvas.width = bgCanvas.width = window.innerWidth;
            h = canvas.height = bgCanvas.height = window.innerHeight;
            initParticles();
        }

        // በምስሉ ላይ የሚታየው ዓይነት ቅንጣጣቶች (Particles)
        function initParticles() {
            particles = [];
            for(let i=0; i<150; i++) {
                particles.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    size: Math.random() * 2 + 0.5,
                    speedX: (Math.random() - 0.5) * 0.5,
                    speedY: (Math.random() - 0.5) * 0.5,
                    life: Math.random()
                });
            }
        }

        // የልብ ቅርጽ ቀመር (Heart Path)
        function drawHeartPath(c, x, y, size) {
            c.beginPath();
            for (let t = 0; t <= Math.PI * 2; t += 0.01) {
                const r = size / 16;
                const hx = 16 * Math.pow(Math.sin(t), 3);
                const hy = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                if (t === 0) c.moveTo(x + hx * r, y - hy * r);
                else c.lineTo(x + hx * r, y - hy * r);
            }
            c.closePath();
        }

        function animate(time) {
            // ዳራውን መሳል (ከዋክብት እና ጭጋግ)
            bgCtx.fillStyle = 'rgba(0, 0, 10, 0.2)';
            bgCtx.fillRect(0, 0, w, h);
            
            // የልብ ትርታ (Breathe effect)
            const pulse = 1 + Math.sin(time * 0.003) * 0.05;
            const heartSize = Math.min(w, h) * 0.7 * pulse;
            const cx = w / 2;
            const cy = h / 2;

            ctx.clearRect(0, 0, w, h);

            // 1. ካሜራውን በልብ ውስጥ መሳል
            ctx.save();
            drawHeartPath(ctx, cx, cy, heartSize);
            ctx.clip();
            if (camOn) {
                ctx.save();
                ctx.translate(w, 0);
                ctx.scale(-1, 1); // Mirror effect
                const aspect = vid.videoWidth / vid.videoHeight;
                let drawW = heartSize * 1.5;
                let drawH = drawW / aspect;
                ctx.drawImage(vid, (w - cx) - drawW/2, cy - drawH/2, drawW, drawH);
                ctx.restore();
            } else {
                ctx.fillStyle = '#1a000d';
                ctx.fill();
            }
            ctx.restore();

            // 2. በምስሉ ላይ እንደሚታየው የልብ ድንበር ቅንጣጣቶች
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ff0066';
            ctx.strokeStyle = 'rgba(255, 0, 102, 0.8)';
            ctx.lineWidth = 3;
            drawHeartPath(ctx, cx, cy, heartSize);
            ctx.stroke();

            // 3. የሚንሳፈፉ ቅንጣጣቶች (የምስሉን ዘይቤ ለመከተል)
            particles.forEach(p => {
                p.x += p.speedX;
                p.y += p.speedY;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 215, 0, ${Math.abs(Math.sin(time * 0.001 + p.life))})`;
                ctx.fill();
                if(p.x > w || p.x < 0) p.speedX *= -1;
                if(p.y > h || p.y < 0) p.speedY *= -1;
            });

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        initCam();
        requestAnimationFrame(animate);
    </script>
</body>
</html>
