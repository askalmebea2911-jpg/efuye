<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>የኔ ወርቅ ሴት</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            background:#000;overflow:hidden;
            position:fixed;width:100vw;height:100vh;
            touch-action:none;
        }
        canvas{position:fixed;top:0;left:0;width:100%;height:100%}
        #bg{z-index:1}
        #three{z-index:2;pointer-events:none}
        #cam{z-index:3;pointer-events:none}
        #lens{z-index:4;pointer-events:none}
        #fluff{z-index:5;pointer-events:none}
        #txt{
            position:fixed;top:50%;left:50%;
            transform:translate(-50%,-50%);
            z-index:6;text-align:center;
            pointer-events:none;width:100%
        }
        #t1{
            font:900 clamp(22px,5vw,34px) 'Nyala',serif;
            color:#fff;
            text-shadow:0 0 30px #f06,0 0 60px #f03
        }
        #t2{
            font:clamp(16px,4vw,22px) 'Nyala',serif;
            color:#fd0;
            text-shadow:0 0 20px #fa0
        }
    </style>
</head>
<body>
    <video id="vid" autoplay playsinline muted style="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0"></video>
    <canvas id="bg"></canvas>
    <canvas id="three"></canvas>
    <canvas id="cam"></canvas>
    <canvas id="lens"></canvas>
    <div id="txt"><div id="t1">💫 የኔ ወርቅ ሴት 💫</div><div id="t2">አፈቅርሻለሁ ❤️</div></div>
    <canvas id="fluff"></canvas>

    <script type="importmap">
        {"imports":{"three":"https://unpkg.com/three@0.157.0/build/three.module.js"}}
    </script>

    <script type="module">
        import * as THREE from 'three';

        const W=()=>window.innerWidth;
        const H=()=>window.innerHeight;
        const isMobile=/Mobi|Android/i.test(navigator.userAgent);

        const vid=document.getElementById('vid');
        const bgC=document.getElementById('bg').getContext('2d');
        const camC=document.getElementById('cam').getContext('2d');
        const lensC=document.getElementById('lens').getContext('2d');
        const flC=document.getElementById('fluff').getContext('2d');

        let camOn=false;

        // ========== ካሜራ ከፈት ==========
        (async()=>{
            try{
                const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:640,height:640}});
                vid.srcObject=s;
                vid.onloadedmetadata=()=>{vid.play();camOn=true}
            }catch(e){camOn=false}
        })();

        // ========== ጋላክሲ ዳራ ==========
        let stars=[],nebs=[],shootingStars=[];

        class Star{
            constructor(){this.rst(true)}
            rst(f){this.x=f?Math.random()*W():(Math.random()<0.5?-10:W()+10);this.y=f?Math.random()*H():Math.random()*H();this.r=Math.random()*1.8+0.3;this.sp=Math.random()*0.02+0.005;this.ph=Math.random()*Math.PI*2;this.hue=Math.random()<0.25?Math.random()*40+20:Math.random()*60+200}
            up(){this.ph+=this.sp;this.x+=0.03;if(this.x>W()+10)this.rst(false)}
            dr(c){const a=(Math.sin(this.ph)+1)/2*0.7+0.3;c.beginPath();c.arc(this.x,this.y,this.r,0,Math.PI*2);c.fillStyle=`hsla(${this.hue},80%,75%,${a})`;c.fill();if(this.r>1&&a>0.75){c.beginPath();c.arc(this.x,this.y,this.r*4,0,Math.PI*2);c.fillStyle=`hsla(${this.hue},80%,75%,${a*0.08})`;c.fill()}}
        }

        class Nebula{
            constructor(){this.x=Math.random()*W();this.y=Math.random()*H();this.rad=Math.random()*180+80;this.hue=[280,320,340,30,200,250][Math.floor(Math.random()*6)];this.al=Math.random()*0.05+0.03;this.sp=(Math.random()-0.5)*0.1;this.branches=[];for(let i=0;i<50;i++){const a=Math.random()*Math.PI*2;const d=Math.random()*this.rad;this.branches.push({x:this.x+Math.cos(a)*d,y:this.y+Math.sin(a)*d*0.6,r:Math.random()*2+0.5,ph:Math.random()*Math.PI*2,sp:Math.random()*0.03+0.01})}}
            up(){this.x+=this.sp;if(this.x>W()+this.rad)this.x=-this.rad;if(this.x<-this.rad)this.x=W()+this.rad;for(let b of this.branches)b.ph+=b.sp}
            dr(c){const g=c.createRadialGradient(this.x,this.y,0,this.x,this.y,this.rad);g.addColorStop(0,`hsla(${this.hue},70%,60%,${this.al*2})`);g.addColorStop(0.4,`hsla(${this.hue},55%,45%,${this.al})`);g.addColorStop(0.7,`hsla(${this.hue},40%,30%,${this.al*0.3})`);g.addColorStop(1,'transparent');c.fillStyle=g;c.fillRect(this.x-this.rad,this.y-this.rad,this.rad*2,this.rad*2);for(let b of this.branches){const a=(Math.sin(b.ph)+1)/2*0.6+0.4;c.beginPath();c.arc(b.x,b.y,b.r,0,Math.PI*2);c.fillStyle=`hsla(${this.hue},80%,70%,${a*this.al*3})`;c.fill()}}
        }

        class ShootingStar{
            constructor(){this.rst()}
            rst(){this.x=Math.random()*W();this.y=Math.random()*H()*0.4;this.len=Math.random()*100+50;this.speed=Math.random()*9+5;this.angle=Math.PI/4+(Math.random()-0.5)*0.5;this.life=1}
            up(){this.x+=Math.cos(this.angle)*this.speed;this.y+=Math.sin(this.angle)*this.speed;this.life-=0.005;if(this.life<=0||this.x>W()+100||this.y>H()+100)this.rst()}
            dr(c){if(this.life<=0)return;const ex=this.x-Math.cos(this.angle)*this.len;const ey=this.y-Math.sin(this.angle)*this.len;const g=c.createLinearGradient(this.x,this.y,ex,ey);g.addColorStop(0,`rgba(255,255,255,${this.life})`);g.addColorStop(1,'rgba(255,255,255,0)');c.beginPath();c.moveTo(this.x,this.y);c.lineTo(ex,ey);c.strokeStyle=g;c.lineWidth=2;c.stroke()}
        }

        function initBg(){stars=[];for(let i=0;i<(isMobile?120:200);i++)stars.push(new Star());nebs=[];for(let i=0;i<(isMobile?3:6);i++)nebs.push(new Nebula());shootingStars=[];for(let i=0;i<3;i++)shootingStars.push(new ShootingStar())}

        function drawBg(){bgC.clearRect(0,0,W(),H());const g=bgC.createRadialGradient(W()/2,H()/2,0,W()/2,H()/2,Math.max(W(),H())*0.8);g.addColorStop(0,'rgba(30,5,60,0.4)');g.addColorStop(0.3,'rgba(15,2,30,0.5)');g.addColorStop(0.6,'rgba(5,0,15,0.8)');g.addColorStop(1,'#000005');bgC.fillStyle=g;bgC.fillRect(0,0,W(),H());for(let n of nebs){n.up();n.dr(bgC)}for(let s of stars){s.up();s.dr(bgC)}for(let ss of shootingStars){ss.up();ss.dr(bgC)}}

        // ========== 3D ልብ ቅርጽ ==========
        const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('three'),alpha:true,antialias:!isMobile});
        renderer.setPixelRatio(Math.min(devicePixelRatio,2));
        renderer.setSize(W(),H());

        const scene=new THREE.Scene();
        const camera3D=new THREE.PerspectiveCamera(50,W()/H(),0.1,1000);
        camera3D.position.z=isMobile?16:14;

        const heartGroup=new THREE.Group();
        scene.add(heartGroup);

        // የልብ ቅርጽ ሒሳብ
        function heartEq(t){
            return {
                x:16*Math.pow(Math.sin(t),3)*0.35,
                y:(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))*0.35,
                z:2.5*Math.sin(t)*Math.cos(t)*0.35
            };
        }

        // የ3D ልብ ቅንጣቶች
        const particleCount=isMobile?2500:4000;
        const geo=new THREE.BufferGeometry();
        const positions=new Float32Array(particleCount*3);
        const colors=new Float32Array(particleCount*3);

        for(let i=0;i<particleCount;i++){
            const t=(i/particleCount)*Math.PI*2;
            const pt=heartEq(t);
            const spread=0.4;
            positions[i*3]=pt.x+(Math.random()-0.5)*spread;
            positions[i*3+1]=pt.y+(Math.random()-0.5)*spread;
            positions[i*3+2]=pt.z+(Math.random()-0.5)*spread;

            const hue=0.95+Math.random()*0.08;
            const col=new THREE.Color().setHSL(hue,1,0.4+Math.random()*0.5);
            colors[i*3]=col.r;
            colors[i*3+1]=col.g;
            colors[i*3+2]=col.b;
        }

        geo.setAttribute('position',new THREE.BufferAttribute(positions,3));
        geo.setAttribute('color',new THREE.BufferAttribute(colors,3));

        // የሚያብረቀርቅ ቴክስቸር
        const texCanvas=document.createElement('canvas');
        texCanvas.width=32;texCanvas.height=32;
        const texCtx=texCanvas.getContext('2d');
        const texGrad=texCtx.createRadialGradient(16,16,0,16,16,16);
        texGrad.addColorStop(0,'rgba(255,255,255,1)');
        texGrad.addColorStop(0.2,'rgba(255,255,255,0.9)');
        texGrad.addColorStop(0.5,'rgba(255,150,180,0.5)');
        texGrad.addColorStop(0.8,'rgba(255,50,80,0.1)');
        texGrad.addColorStop(1,'rgba(0,0,0,0)');
        texCtx.fillStyle=texGrad;
        texCtx.fillRect(0,0,32,32);
        const tex=new THREE.CanvasTexture(texCanvas);

        const mat=new THREE.PointsMaterial({
            size:isMobile?0.2:0.16,
            map:tex,
            vertexColors:true,
            blending:THREE.AdditiveBlending,
            depthWrite:false,
            transparent:true,
            opacity:0.85
        });

        heartGroup.add(new THREE.Points(geo,mat));

        // የውጭ ብርሃን
        const glowCount=isMobile?600:1000;
        const glowGeo=new THREE.BufferGeometry();
        const glowPos=new Float32Array(glowCount*3);
        for(let i=0;i<glowCount;i++){
            const pt=heartEq((i/glowCount)*Math.PI*2);
            const sf=1.3+Math.random()*0.5;
            glowPos[i*3]=pt.x*sf+(Math.random()-0.5)*0.5;
            glowPos[i*3+1]=pt.y*sf+(Math.random()-0.5)*0.5;
            glowPos[i*3+2]=pt.z*sf;
        }
        glowGeo.setAttribute('position',new THREE.BufferAttribute(glowPos,3));
        const glowMat=new THREE.PointsMaterial({
            size:isMobile?0.35:0.25,
            map:tex,
            color:0xff3355,
            blending:THREE.AdditiveBlending,
            depthWrite:false,
            transparent:true,
            opacity:0.3
        });
        heartGroup.add(new THREE.Points(glowGeo,glowMat));

        // ========== የልብ ስክሪን ቦታ ==========
        function getHeartScreenPos(){
            const v=new THREE.Vector3(0,-0.3,0);
            v.applyMatrix4(heartGroup.matrixWorld);
            v.project(camera3D);
            const sx=(v.x*0.5+0.5)*W();
            const sy=(-v.y*0.5+0.5)*H();
            const baseSize=Math.min(W(),H())*0.72;
            const breathe=1+Math.sin(Date.now()*0.0015)*0.04;
            const size=Math.min(baseSize*breathe,Math.min(W(),H())*0.88);
            const half=size/2;
            return {
                x:Math.max(half,Math.min(W()-half,sx)),
                y:Math.max(half,Math.min(H()-half,sy)),
                size:size
            };
        }

        // ========== ካሜራ በልብ ቅርጽ ==========
        function drawCamInHeart(pos){
            camC.clearRect(0,0,W(),H());
            const {x:cx,y:cy,size}=pos;
            const s=size/30;

            camC.save();
            camC.beginPath();
            camC.moveTo(cx,cy-s*5);
            camC.bezierCurveTo(cx-s*12,cy-s*12,cx-s*18,cy+s*2,cx,cy+s*14);
            camC.bezierCurveTo(cx+s*18,cy+s*2,cx+s*12,cy-s*12,cx,cy-s*5);
            camC.closePath();
            camC.clip();

            if(camOn&&vid.readyState>=2){
                camC.save();
                camC.scale(-1,1);
                const vs=size*1.55;
                camC.drawImage(vid,-(cx+vs/2),cy-vs/2,vs,vs);
                camC.restore();
            }else{
                const g=camC.createRadialGradient(cx,cy-size*0.05,size*0.05,cx,cy,size*0.6);
                g.addColorStop(0,'rgba(255,20,60,0.5)');
                g.addColorStop(0.5,'rgba(255,15,45,0.2)');
                g.addColorStop(1,'rgba(255,10,30,0.03)');
                camC.fillStyle=g;camC.fill();
            }
            camC.restore();
        }

        // ========== ሌንስ ==========
        function drawLens(pos){
            lensC.clearRect(0,0,W(),H());
            const {x:cx,y:cy,size}=pos;

            const g=lensC.createRadialGradient(cx,cy,size*0.4,cx,cy,size*0.62);
            g.addColorStop(0,'rgba(0,0,0,0)');
            g.addColorStop(0.5,'rgba(0,0,0,0.05)');
            g.addColorStop(0.8,'rgba(0,0,0,0.25)');
            g.addColorStop(1,'rgba(0,0,0,0.55)');
            lensC.fillStyle=g;lensC.fillRect(0,0,W(),H());

            const hl=lensC.createRadialGradient(cx-size*0.1,cy-size*0.18,size*0.02,cx,cy,size*0.45);
            hl.addColorStop(0,'rgba(255,255,255,0.22)');
            hl.addColorStop(0.3,'rgba(255,255,255,0.04)');
            hl.addColorStop(1,'rgba(0,0,0,0)');
            lensC.fillStyle=hl;lensC.fillRect(0,0,W(),H());
        }

        // ========== እፉዬ ገላ ==========
        let fluffs=[];
        class Fl{
            constructor(){this.rst(true)}
            rst(f){this.x=f?Math.random()*W():-50;this.y=f?Math.random()*H():Math.random()*H();this.vx=(Math.random()-0.5)*0.6;this.vy=-Math.random()*0.5-0.15;this.sz=Math.random()*3+2;this.fz=this.sz*3;this.w=Math.random()*Math.PI*2;this.ws=(Math.random()-0.5)*0.035;this.o=Math.random()*0.35+0.55;this.n=14+Math.floor(Math.random()*8)}
            up(){this.w+=this.ws;this.vx+=Math.sin(this.w)*0.015;this.vy+=Math.cos(this.w)*0.015;this.x+=this.vx;this.y+=this.vy;this.vx*=0.998;this.vy*=0.998;if(this.x<-60)this.x=W()+60;if(this.x>W()+60)this.x=-60;if(this.y<-60)this.y=H()+60;if(this.y>H()+60)this.y=-60}
            dr(c){c.save();c.translate(this.x,this.y);c.globalAlpha=this.o;for(let i=0;i<this.n;i++){const a=(i/this.n)*Math.PI*2+this.w*0.35;const sx=Math.cos(a)*this.sz*0.45;const sy=Math.sin(a)*this.sz*0.45;const ex=Math.cos(a)*this.fz;const ey=Math.sin(a)*this.fz;c.beginPath();c.moveTo(sx,sy);c.lineTo(ex,ey);c.strokeStyle='rgba(255,255,255,0.55)';c.lineWidth=0.6;c.stroke();c.beginPath();c.arc(ex,ey,0.7,0,Math.PI*2);c.fillStyle='rgba(255,255,255,0.75)';c.fill()}c.beginPath();c.arc(0,0,this.sz*0.5,0,Math.PI*2);c.fillStyle='#fef9f0';c.fill();c.restore()}
        }
        function initFl(){fluffs=[];for(let i=0;i<(isMobile?40:60);i++)fluffs.push(new Fl())}
        function drawFl(){flC.clearRect(0,0,W(),H());for(let f of fluffs){f.up();f.dr(flC)}}

        // ========== ሪሳይዝ ==========
        function resize(){
            ['bg','cam','lens','fluff'].forEach(id=>{
                const c=document.getElementById(id);
                c.width=W();c.height=H();
            });
            renderer.setSize(W(),H());
            camera3D.aspect=W()/H();
            camera3D.updateProjectionMatrix();
            initBg();initFl();
        }
        window.addEventListener('resize',resize);

        // ========== አኒሜሽን ==========
        function animate(ts){
            const t=ts*0.001;

            // 3D ልብ ማሽከርከር
            heartGroup.rotation.y=Math.sin(t*0.5)*0.4;
            heartGroup.rotation.x=Math.cos(t*0.6)*0.2;
            heartGroup.rotation.z=Math.sin(t*0.4)*0.25;
            heartGroup.scale.setScalar(1+Math.sin(t*1.8)*0.04);
            heartGroup.updateMatrixWorld();

            // ሁሉንም መሳል
            drawBg();
            renderer.render(scene,camera3D);

            const heartPos=getHeartScreenPos();
            drawCamInHeart(heartPos);
            drawLens(heartPos);
            drawFl();

            requestAnimationFrame(animate);
        }

        // ========== ማስጀመር ==========
        resize();
        requestAnimationFrame(animate);
    </script>
</body>
</html>
