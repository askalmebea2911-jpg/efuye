<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>የኔ ወርቅ ሴት</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#000;overflow:hidden;position:fixed;width:100vw;height:100vh;touch-action:none}
        canvas{position:fixed;top:0;left:0;width:100%;height:100%}
        #bg{z-index:1}
        #three{z-index:2;pointer-events:none}
        #cam{z-index:3;pointer-events:none}
        #fluff{z-index:4;pointer-events:none}
        #txt{
            position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
            z-index:5;text-align:center;pointer-events:none;width:100%
        }
        #t1{font:900 clamp(22px,5vw,34px) 'Nyala',serif;color:#fff;text-shadow:0 0 30px #f06,0 0 60px #f03}
        #t2{font:clamp(16px,4vw,22px) 'Nyala',serif;color:#fd0;text-shadow:0 0 20px #fa0}
    </style>
</head>
<body>
    <video id="vid" autoplay playsinline muted style="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0"></video>
    <canvas id="bg"></canvas>
    <canvas id="three"></canvas>
    <canvas id="cam"></canvas>
    <div id="txt"><div id="t1">💫 የኔ ወርቅ ሴት 💫</div><div id="t2">አፈቅርሻለሁ ❤️</div></div>
    <canvas id="fluff"></canvas>

    <script type="importmap">
        {"imports":{"three":"https://unpkg.com/three@0.157.0/build/three.module.js"}}
    </script>

    <script type="module">
        import * as THREE from 'three';

        const W=()=>window.innerWidth;
        const H=()=>window.innerHeight;
        const isMobile=/Mobi|Android/i.test(navigator.userAgent);

        const vid=document.getElementById('vid');
        const bgC=document.getElementById('bg').getContext('2d');
        const camC=document.getElementById('cam').getContext('2d');
        const flC=document.getElementById('fluff').getContext('2d');
        let camOn=false;

        // ========== ካሜራ ==========
        (async()=>{
            try{
                const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:640,height:640}});
                vid.srcObject=s;vid.onloadedmetadata=()=>{vid.play();camOn=true}
            }catch(e){camOn=false}
        })();

        // ========== ጋላክሲ - ጎል ያለ ==========
        let stars=[],nebs=[],shootingStars=[];
        class Star{
            constructor(){this.rst(true)}
            rst(f){this.x=f?Math.random()*W():(Math.random()<0.5?-10:W()+10);this.y=f?Math.random()*H():Math.random()*H();this.r=Math.random()*2.5+0.8;this.sp=Math.random()*0.015+0.003;this.ph=Math.random()*Math.PI*2;this.hue=Math.random()<0.3?Math.random()*40+20:Math.random()*60+200;this.sat=70+Math.random()*30;this.lit=70+Math.random()*30}
            up(){this.ph+=this.sp;this.x+=0.02;if(this.x>W()+10)this.rst(false)}
            dr(c){
                const a=(Math.sin(this.ph)+1)/2*0.6+0.4;
                const bright=0.7+a*0.3;
                c.beginPath();c.arc(this.x,this.y,this.r,0,Math.PI*2);
                c.fillStyle=`hsla(${this.hue},${this.sat}%,${this.lit}%,${bright})`;c.fill();
                c.beginPath();c.arc(this.x,this.y,this.r*4,0,Math.PI*2);
                c.fillStyle=`hsla(${this.hue},${this.sat}%,${this.lit}%,${bright*0.12})`;c.fill();
            }
        }
        class Nebula{
            constructor(){this.x=Math.random()*W();this.y=Math.random()*H();this.rad=Math.random()*200+100;this.hue=[280,320,340,30,200,250][Math.floor(Math.random()*6)];this.al=Math.random()*0.06+0.04;this.sp=(Math.random()-0.5)*0.08;this.branches=[];for(let i=0;i<60;i++){const a=Math.random()*Math.PI*2;const d=Math.random()*this.rad;this.branches.push({x:this.x+Math.cos(a)*d,y:this.y+Math.sin(a)*d*0.6,r:Math.random()*2.5+0.8,ph:Math.random()*Math.PI*2,sp:Math.random()*0.03+0.01})}}
            up(){this.x+=this.sp;if(this.x>W()+this.rad)this.x=-this.rad;if(this.x<-this.rad)this.x=W()+this.rad;for(let b of this.branches)b.ph+=b.sp}
            dr(c){
                const g=c.createRadialGradient(this.x,this.y,0,this.x,this.y,this.rad);
                g.addColorStop(0,`hsla(${this.hue},70%,65%,${this.al*2.5})`);
                g.addColorStop(0.3,`hsla(${this.hue},60%,50%,${this.al*1.5})`);
                g.addColorStop(0.6,`hsla(${this.hue},45%,35%,${this.al*0.6})`);
                g.addColorStop(1,'transparent');
                c.fillStyle=g;c.fillRect(this.x-this.rad,this.y-this.rad,this.rad*2,this.rad*2);
                for(let b of this.branches){const a=(Math.sin(b.ph)+1)/2*0.5+0.5;c.beginPath();c.arc(b.x,b.y,b.r,0,Math.PI*2);c.fillStyle=`hsla(${this.hue},80%,75%,${a*this.al*4})`;c.fill()}
            }
        }
        class ShootingStar{
            constructor(){this.rst()}
            rst(){this.x=Math.random()*W();this.y=Math.random()*H()*0.4;this.len=Math.random()*120+60;this.speed=Math.random()*10+6;this.angle=Math.PI/4+(Math.random()-0.5)*0.5;this.life=1}
            up(){this.x+=Math.cos(this.angle)*this.speed;this.y+=Math.sin(this.angle)*this.speed;this.life-=0.004;if(this.life<=0||this.x>W()+100||this.y>H()+100)this.rst()}
            dr(c){if(this.life<=0)return;const ex=this.x-Math.cos(this.angle)*this.len;const ey=this.y-Math.sin(this.angle)*this.len;const g=c.createLinearGradient(this.x,this.y,ex,ey);g.addColorStop(0,`rgba(255,255,255,${this.life})`);g.addColorStop(0.4,`rgba(255,255,200,${this.life*0.6})`);g.addColorStop(1,'rgba(255,255,255,0)');c.beginPath();c.moveTo(this.x,this.y);c.lineTo(ex,ey);c.strokeStyle=g;c.lineWidth=2.5;c.shadowColor='rgba(255,255,255,0.5)';c.shadowBlur=10;c.stroke()}
        }
        function initBg(){stars=[];for(let i=0;i<(isMobile?150:250);i++)stars.push(new Star());nebs=[];for(let i=0;i<(isMobile?4:7);i++)nebs.push(new Nebula());shootingStars=[];for(let i=0;i<4;i++)shootingStars.push(new ShootingStar())}
        function drawBg(){bgC.clearRect(0,0,W(),H());const g=bgC.createRadialGradient(W()/2,H()/2,0,W()/2,H()/2,Math.max(W(),H())*0.8);g.addColorStop(0,'rgba(35,8,70,0.5)');g.addColorStop(0.3,'rgba(18,3,40,0.6)');g.addColorStop(0.6,'rgba(8,1,20,0.8)');g.addColorStop(1,'#000003');bgC.fillStyle=g;bgC.fillRect(0,0,W(),H());for(let n of nebs){n.up();n.dr(bgC)}for(let s of stars){s.up();s.dr(bgC)}for(let ss of shootingStars){ss.up();ss.dr(bgC)}}

        // ========== 3D ልብ ==========
        const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('three'),alpha:true,antialias:true});
        renderer.setPixelRatio(Math.min(devicePixelRatio,2));
        renderer.setSize(W(),H());
        const scene=new THREE.Scene();
        const cam3D=new THREE.PerspectiveCamera(50,W()/H(),0.1,1000);
        cam3D.position.z=isMobile?15:13;
        const heartGroup=new THREE.Group();
        scene.add(heartGroup);

        function heartEq(t){
            return{x:16*Math.pow(Math.sin(t),3)*0.35,y:(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))*0.35,z:2.5*Math.sin(t)*Math.cos(t)*0.35};
        }

        // ዋና ቅንጣቶች
        const pc=isMobile?3000:5000;
        const pGeo=new THREE.BufferGeometry();
        const pPos=new Float32Array(pc*3);
        const pCol=new Float32Array(pc*3);
        for(let i=0;i<pc;i++){
            const t=(i/pc)*Math.PI*2;
            const pt=heartEq(t);
            pPos[i*3]=pt.x+(Math.random()-0.5)*0.3;
            pPos[i*3+1]=pt.y+(Math.random()-0.5)*0.3;
            pPos[i*3+2]=pt.z+(Math.random()-0.5)*0.3;
            const c=new THREE.Color().setHSL(0.95+Math.random()*0.08,1,0.4+Math.random()*0.5);
            pCol[i*3]=c.r;pCol[i*3+1]=c.g;pCol[i*3+2]=c.b;
        }
        pGeo.setAttribute('position',new THREE.BufferAttribute(pPos,3));
        pGeo.setAttribute('color',new THREE.BufferAttribute(pCol,3));

        // ቴክስቸር
        const tCanvas=document.createElement('canvas');tCanvas.width=32;tCanvas.height=32;
        const tCtx=tCanvas.getContext('2d');
        const tGrad=tCtx.createRadialGradient(16,16,0,16,16,16);
        tGrad.addColorStop(0,'rgba(255,255,255,1)');tGrad.addColorStop(0.15,'rgba(255,255,255,0.95)');
        tGrad.addColorStop(0.4,'rgba(255,180,200,0.6)');tGrad.addColorStop(0.7,'rgba(255,50,80,0.2)');
        tGrad.addColorStop(1,'rgba(0,0,0,0)');tCtx.fillStyle=tGrad;tCtx.fillRect(0,0,32,32);
        const tex=new THREE.CanvasTexture(tCanvas);

        const pMat=new THREE.PointsMaterial({size:isMobile?0.16:0.13,map:tex,vertexColors:true,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:0.9});
        heartGroup.add(new THREE.Points(pGeo,pMat));

        // ጨረሮች (lines) - አንጸባራቂ
        const lineCount=200;
        const lineGeo=new THREE.BufferGeometry();
        const lineVerts=[];
        for(let i=0;i<lineCount;i++){
            const t=(i/lineCount)*Math.PI*2;
            const pt=heartEq(t);
            const pt2=heartEq(t+0.02);
            lineVerts.push(pt.x,pt.y,pt.z,pt2.x,pt2.y,pt2.z);
        }
        lineGeo.setAttribute('position',new THREE.Float32BufferAttribute(lineVerts,3));
        const lineMat=new THREE.LineBasicMaterial({color:0xff5580,transparent:true,opacity:0.6,blending:THREE.AdditiveBlending});
        heartGroup.add(new THREE.LineSegments(lineGeo,lineMat));

        // የውጭ ጨረሮች
        const oLineCount=150;
        const oLineGeo=new THREE.BufferGeometry();
        const oLineVerts=[];
        for(let i=0;i<oLineCount;i++){
            const t=(i/oLineCount)*Math.PI*2;
            const pt=heartEq(t);
            const sf=1.25;
            oLineVerts.push(pt.x*sf,pt.y*sf,pt.z*sf,pt.x*(sf+0.08),pt.y*(sf+0.08),pt.z*(sf+0.08));
        }
        oLineGeo.setAttribute('position',new THREE.Float32BufferAttribute(oLineVerts,3));
        const oLineMat=new THREE.LineBasicMaterial({color:0xff3366,transparent:true,opacity:0.25,blending:THREE.AdditiveBlending});
        heartGroup.add(new THREE.LineSegments(oLineGeo,oLineMat));

        // ========== 3D ልብ ቦታ ወደ 2D ==========
        function getHeart2D(){
            const pts=[];
            for(let i=0;i<100;i++){
                const t=(i/100)*Math.PI*2;
                const pt=heartEq(t);
                const v=new THREE.Vector3(pt.x,pt.y,pt.z);
                v.applyMatrix4(heartGroup.matrixWorld);
                v.project(cam3D);
                pts.push({x:(v.x*0.5+0.5)*W(),y:(-v.y*0.5+0.5)*H()});
            }
            let mnX=Infinity,mnY=Infinity,mxX=-Infinity,mxY=-Infinity;
            for(const p of pts){if(p.x<mnX)mnX=p.x;if(p.y<mnY)mnY=p.y;if(p.x>mxX)mxX=p.x;if(p.y>mxY)mxY=p.y;}
            const rawSize=Math.max(mxX-mnX,mxY-mnY)*1.1;
            const size=Math.min(rawSize,Math.min(W(),H())*0.85);
            const cx=(mnX+mxX)/2,cy=(mnY+mxY)/2,half=size/2;
            return{x:Math.max(half,Math.min(W()-half,cx)),y:Math.max(half,Math.min(H()-half,cy)),size};
        }

        // ========== ካሜራ በ3D ልብ ውስጥ ==========
        function drawCam(pos){
            camC.clearRect(0,0,W(),H());
            const{x:cx,y:cy,size}=pos;
            const s=size/30;
            camC.save();
            camC.beginPath();
            camC.moveTo(cx,cy-s*5);
            camC.bezierCurveTo(cx-s*12,cy-s*12,cx-s*18,cy+s*2,cx,cy+s*14);
            camC.bezierCurveTo(cx+s*18,cy+s*2,cx+s*12,cy-s*12,cx,cy-s*5);
            camC.closePath();camC.clip();
            if(camOn&&vid.readyState>=2){camC.save();camC.scale(-1,1);const vs=size*1.5;camC.drawImage(vid,-(cx+vs/2),cy-vs/2,vs,vs);camC.restore();}
            else{const g=camC.createRadialGradient(cx,cy-sz*0.05,size*0.05,cx,cy,size*0.6);g.addColorStop(0,'rgba(255,20,60,0.45)');g.addColorStop(1,'rgba(0,0,0,0)');camC.fillStyle=g;camC.fill();}
            camC.restore();
        }

        // ========== እፉዬ ገላ - አንጸባራቂ ==========
        let fluffs=[];
        class Fl{
            constructor(){this.rst(true)}
            rst(f){this.x=f?Math.random()*W():-50;this.y=f?Math.random()*H():Math.random()*H();this.vx=(Math.random()-0.5)*0.5;this.vy=-Math.random()*0.45-0.1;this.sz=Math.random()*3.5+2.5;this.fz=this.sz*3.2;this.w=Math.random()*Math.PI*2;this.ws=(Math.random()-0.5)*0.03;this.o=Math.random()*0.4+0.55;this.n=16+Math.floor(Math.random()*8)}
            up(){this.w+=this.ws;this.vx+=Math.sin(this.w)*0.012;this.vy+=Math.cos(this.w)*0.012;this.x+=this.vx;this.y+=this.vy;this.vx*=0.998;this.vy*=0.998;if(this.x<-60)this.x=W()+60;if(this.x>W()+60)this.x=-60;if(this.y<-60)this.y=H()+60;if(this.y>H()+60)this.y=-60}
            dr(c){c.save();c.translate(this.x,this.y);c.globalAlpha=this.o;
                for(let i=0;i<this.n;i++){const a=(i/this.n)*Math.PI*2+this.w*0.3;
                    const sx=Math.cos(a)*this.sz*0.4,sy=Math.sin(a)*this.sz*0.4,ex=Math.cos(a)*this.fz,ey=Math.sin(a)*this.fz;
                    c.beginPath();c.moveTo(sx,sy);c.lineTo(ex,ey);c.strokeStyle='rgba(255,255,255,0.65)';c.lineWidth=0.7;c.stroke();
                    c.beginPath();c.arc(ex,ey,0.9,0,Math.PI*2);c.fillStyle='rgba(255,255,255,0.85)';c.fill();
                    c.beginPath();c.arc(ex,ey,2.5,0,Math.PI*2);c.fillStyle='rgba(255,255,255,0.2)';c.fill();}
                c.beginPath();c.arc(0,0,this.sz*0.55,0,Math.PI*2);
                const seedGrad=c.createRadialGradient(0,0,0,0,0,this.sz*0.55);
                seedGrad.addColorStop(0,'#ffffff');seedGrad.addColorStop(0.6,'#fef9f0');seedGrad.addColorStop(1,'rgba(200,180,150,0.3)');
                c.fillStyle=seedGrad;c.fill();
                c.restore();}
        }
        function initFl(){fluffs=[];for(let i=0;i<(isMobile?45:65);i++)fluffs.push(new Fl())}
        function drawFl(){flC.clearRect(0,0,W(),H());for(let f of fluffs){f.up();f.dr(flC)}}

        // ========== ሪሳይዝ ==========
        function resize(){['bg','cam','fluff'].forEach(id=>{const c=document.getElementById(id);c.width=W();c.height=H();});renderer.setSize(W(),H());cam3D.aspect=W()/H();cam3D.updateProjectionMatrix();initBg();initFl()}
        window.addEventListener('resize',resize);

        // ========== አኒሜሽን ==========
        let t=0;
        function animate(ts){
            t=ts*0.001;
            heartGroup.rotation.y=Math.sin(t*0.5)*0.45;
            heartGroup.rotation.x=Math.cos(t*0.6)*0.22;
            heartGroup.rotation.z=Math.sin(t*0.4)*0.28;
            heartGroup.scale.setScalar(1+Math.sin(t*1.8)*0.04);
            heartGroup.updateMatrixWorld();

            drawBg();
            renderer.render(scene,cam3D);
            const hp=getHeart2D();
            drawCam(hp);
            drawFl();
            requestAnimationFrame(animate);
        }
        resize();requestAnimationFrame(animate);
    </script>
</body>
</html>
