<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ካሜራ ሙከራ</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
        video { width: 100%; height: auto; border-radius: 20px; }
        button { position: fixed; bottom: 30px; padding: 20px 40px; font-size: 20px; border-radius: 50px; background: #ff2060; color: #fff; border: none; cursor: pointer; z-index: 10; }
    </style>
</head>
<body>
    <video id="v" autoplay playsinline muted style="display:none;"></video>
    <button id="btn">📸 ካሜራ ክፈት</button>
    <script>
        document.getElementById('btn').onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                const v = document.getElementById('v');
                v.srcObject = stream;
                v.style.display = 'block';
                v.play();
                document.getElementById('btn').style.display = 'none';
                console.log('✅ ካሜራ ተከፍቷል!');
            } catch(e) {
                alert('❌ ካሜራ አልተከፈተም: ' + e.name + '\n\nHTTPS ወይም localhost ያስፈልጋል!');
            }
        };
    </script>
</body>
</html>
