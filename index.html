<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>የኔ ወርቅ ሴት</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#000;overflow:hidden;position:fixed;width:100vw;height:100vh;touch-action:none}
        canvas{position:fixed;top:0;left:0}
        #bg{z-index:1}
        #cam{z-index:2;pointer-events:none}
        #lens{z-index:3;pointer-events:none}
        #fluff{z-index:4;pointer-events:none}
        #txt{
            position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
            z-index:5;text-align:center;pointer-events:none;width:100%
        }
        #t1{font:900 clamp(22px,5vw,34px) 'Nyala',serif;color:#fff;text-shadow:0 0 30px #f06,0 0 60px #f03}
        #t2{font:clamp(16px,4vw,22px) 'Nyala',serif;color:#fd0;text-shadow:0 0 20px #fa0}
    </style>
</head>
<body>
    <video id="vid" autoplay playsinline muted style="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0"></video>
    <canvas id="bg"></canvas>
    <canvas id="cam"></canvas>
    <canvas id="lens"></canvas>
    <div id="txt"><div id="t1">💫 የኔ ወርቅ ሴት 💫</div><div id="t2">አፈቅርሻለሁ ❤️</div></div>
    <canvas id="fluff"></canvas>

    <script>
        const W=()=>window.innerWidth;
        const H=()=>window.innerHeight;
        const isMobile=/Mobi|Android/i.test(navigator.userAgent);
        
        const vid=document.getElementById('vid');
        const bgC=document.getElementById('bg').getContext('2d');
        const camC=document.getElementById('cam').getContext('2d');
        const lensC=document.getElementById('lens').getContext('2d');
        const flC=document.getElementById('fluff').getContext('2d');
        
        let camOn=false;

        // ========== ካሜራ ==========
        (async()=>{
            try{
                const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:640,height:640}});
                vid.srcObject=s;
                vid.onloadedmetadata=()=>{vid.play();camOn=true}
            }catch(e){camOn=false}
        })();

        // ========== ዳራ ከዋክብት + ኔቡላ ==========
        let stars=[],nebs=[];
        class Star{
            constructor(){this.rst(true)}
            rst(f){this.x=f?Math.random()*W():(Math.random()<0.5?-10:W()+10);this.y=f?Math.random()*H():Math.random()*H();this.r=Math.random()*1.5+0.3;this.sp=Math.random()*0.02+0.005;this.ph=Math.random()*Math.PI*2}
            up(){this.ph+=this.sp;this.x+=0.02;if(this.x>W()+10)this.rst(false)}
            dr(c){const a=(Math.sin(this.ph)+1)/2*0.6+0.4;c.beginPath();c.arc(this.x,this.y,this.r,0,Math.PI*2);c.fillStyle=`rgba(255,255,255,${a})`;c.fill()}
        }
        class Neb{
            constructor(){this.x=Math.random()*W();this.y=Math.random()*H();this.rad=Math.random()*100+40;this.h=[280,320,340,30,200][Math.floor(Math.random()*5)];this.al=Math.random()*0.03+0.015;this.sp=(Math.random()-0.5)*0.08}
            up(){this.x+=this.sp;if(this.x>W()+this.rad)this.x=-this.rad;if(this.x<-this.rad)this.x=W()+this.rad}
            dr(c){const g=c.createRadialGradient(this.x,this.y,0,this.x,this.y,this.rad);g.addColorStop(0,`hsla(${this.h},60%,55%,${this.al*1.5})`);g.addColorStop(0.5,`hsla(${this.h},45%,35%,${this.al})`);g.addColorStop(1,'transparent');c.fillStyle=g;c.fillRect(this.x-this.rad,this.y-this.rad,this.rad*2,this.rad*2)}
        }
        function initBg(){stars=[];for(let i=0;i<(isMobile?80:150);i++)stars.push(new Star());nebs=[];for(let i=0;i<(isMobile?2:4);i++)nebs.push(new Neb())}
        function drawBg(){bgC.clearRect(0,0,W(),H());const g=bgC.createRadialGradient(W()/2,H()/2,0,W()/2,H()/2,Math.max(W(),H()));g.addColorStop(0,'#1a0030');g.addColorStop(0.5,'#0a0012');g.addColorStop(1,'#000005');bgC.fillStyle=g;bgC.fillRect(0,0,W(),H());for(let n of nebs){n.up();n.dr(bgC)}for(let s of stars){s.up();s.dr(bgC)}}

        // ========== ልብ ቅርጽ ሒሳብ ==========
        function heartX(t){return 16*Math.pow(Math.sin(t),3)}
        function heartY(t){return 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)}
        
        // የልብ እንቅስቃሴ
        let hx=0,hy=0,hs=0,hr=0;
        
        function calcHeart(ts){
            const t=ts*0.001;
            const breathe=1+Math.sin(t*1.8)*0.04;
            const baseSize=Math.min(W(),H())*0.55*breathe;
            const maxSize=Math.min(W(),H())*0.85;
            hs=Math.min(baseSize,maxSize);
            
            const rot=Math.sin(t*0.5)*0.25;
            hr=rot;
            
            const cx=W()/2;
            const cy=H()/2;
            const half=hs/2;
            hx=Math.max(half,Math.min(W()-half,cx+Math.sin(rot)*hs*0.1));
            hy=Math.max(half,Math.min(H()-half,cy+Math.cos(rot)*hs*0.05));
        }
        
        function heartPath(c,cx,cy,sz){
            const s=sz/30;
            c.beginPath();
            c.moveTo(cx,cy-s*5);
            c.bezierCurveTo(cx-s*12,cy-s*12,cx-s*18,cy+s*2,cx,cy+s*14);
            c.bezierCurveTo(cx+s*18,cy+s*2,cx+s*12,cy-s*12,cx,cy-s*5);
            c.closePath();
        }

        // ========== ካሜራ በልብ ቅርጽ ==========
        function drawCam(){
            camC.clearRect(0,0,W(),H());
            camC.save();
            heartPath(camC,hx,hy,hs);
            camC.clip();
            
            if(camOn&&vid.readyState>=2){
                camC.save();
                camC.scale(-1,1);
                const vs=hs*1.6;
                camC.drawImage(vid,-(hx+vs/2),hy-vs/2,vs,vs);
                camC.restore();
            }else{
                const g=camC.createRadialGradient(hx,hy-hs*0.1,hs*0.05,hx,hy,hs*0.6);
                g.addColorStop(0,'rgba(255,20,60,0.5)');
                g.addColorStop(0.5,'rgba(255,15,45,0.2)');
                g.addColorStop(1,'rgba(255,10,30,0.03)');
                camC.fillStyle=g;camC.fill();
            }
            camC.restore();
            
            // የልብ ድንበር
            camC.save();
            heartPath(camC,hx,hy,hs);
            camC.strokeStyle='rgba(255,70,100,0.8)';
            camC.lineWidth=2.5;
            camC.shadowColor='rgba(255,30,60,0.8)';
            camC.shadowBlur=25;
            camC.stroke();
            camC.restore();
        }

        // ========== ሌንስ ==========
        function drawLens(){
            lensC.clearRect(0,0,W(),H());
            
            // Vignette
            const g=lensC.createRadialGradient(hx,hy,hs*0.4,hx,hy,hs*0.62);
            g.addColorStop(0,'rgba(0,0,0,0)');
            g.addColorStop(0.5,'rgba(0,0,0,0.06)');
            g.addColorStop(0.8,'rgba(0,0,0,0.3)');
            g.addColorStop(1,'rgba(0,0,0,0.6)');
            lensC.fillStyle=g;lensC.fillRect(0,0,W(),H());
            
            // ብርሃን ነጸብራቅ
            const hl=lensC.createRadialGradient(hx-hs*0.1,hy-hs*0.18,hs*0.02,hx,hy,hs*0.45);
            hl.addColorStop(0,'rgba(255,255,255,0.25)');
            hl.addColorStop(0.3,'rgba(255,255,255,0.05)');
            hl.addColorStop(1,'rgba(0,0,0,0)');
            lensC.fillStyle=hl;lensC.fillRect(0,0,W(),H());
            
            // ጠርዝ
            lensC.beginPath();lensC.arc(hx,hy,hs*0.5,0,Math.PI*2);
            lensC.strokeStyle='rgba(255,255,255,0.15)';lensC.lineWidth=1.5;
            lensC.shadowColor='rgba(255,255,255,0.25)';lensC.shadowBlur=12;
            lensC.stroke();
        }

        // ========== እፉዬ ገላ ==========
        let fluffs=[];
        class Fl{
            constructor(){this.rst(true)}
            rst(f){this.x=f?Math.random()*W():-40;this.y=f?Math.random()*H():Math.random()*H();this.vx=(Math.random()-0.5)*0.5;this.vy=-Math.random()*0.4;this.s=Math.random()*2+1.2;this.fs=this.s*2.5;this.w=Math.random()*Math.PI*2;this.ws=(Math.random()-0.5)*0.03;this.o=Math.random()*0.3+0.5;this.n=12+Math.floor(Math.random()*6)}
            up(){this.w+=this.ws;this.vx+=Math.sin(this.w)*0.01;this.vy+=Math.cos(this.w)*0.01;this.x+=this.vx;this.y+=this.vy;this.vx*=0.998;this.vy*=0.998;if(this.x<-40)this.x=W()+40;if(this.x>W()+40)this.x=-40;if(this.y<-40)this.y=H()+40;if(this.y>H()+40)this.y=-40}
            dr(c){c.save();c.translate(this.x,this.y);c.globalAlpha=this.o;for(let i=0;i<this.n;i++){const a=(i/this.n)*Math.PI*2+this.w*0.3;c.beginPath();c.moveTo(Math.cos(a)*this.s*0.4,Math.sin(a)*this.s*0.4);c.lineTo(Math.cos(a)*this.fs,Math.sin(a)*this.fs);c.strokeStyle='rgba(255,255,255,0.5)';c.lineWidth=0.4;c.stroke();c.beginPath();c.arc(Math.cos(a)*this.fs,Math.sin(a)*this.fs,0.5,0,Math.PI*2);c.fillStyle='rgba(255,255,255,0.7)';c.fill()}c.beginPath();c.arc(0,0,this.s*0.45,0,Math.PI*2);c.fillStyle='#fef9f0';c.fill();c.restore()}
        }
        function initFl(){fluffs=[];for(let i=0;i<(isMobile?30:45);i++)fluffs.push(new Fl())}
        function drawFl(){flC.clearRect(0,0,W(),H());for(let f of fluffs){f.up();f.dr(flC)}}

        // ========== ሪሳይዝ ==========
        function resize(){
            ['bg','cam','lens','fluff'].forEach(id=>{
                const c=document.getElementById(id);
                c.width=W();c.height=H();
            });
            initBg();initFl();
        }
        window.addEventListener('resize',resize);

        // ========== አኒሜሽን ==========
        function anim(ts){
            calcHeart(ts);
            drawBg();
            drawCam();
            drawLens();
            drawFl();
            requestAnimationFrame(anim);
        }

        resize();requestAnimationFrame(anim);
    </script>
</body>
</html>
